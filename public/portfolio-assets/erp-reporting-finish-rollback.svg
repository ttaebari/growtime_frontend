<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowSlate" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L10 6L1 11V1Z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L10 6L1 11V1Z" fill="#DC2626"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L10 6L1 11V1Z" fill="#7C3AED"/>
    </marker>
  </defs>

  <rect width="1600" height="920" fill="url(#bg)"/>

  <text x="80" y="88" fill="#0F172A" font-size="38" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    Reporting / Comp / Finish 정합성 보상 흐름
  </text>
  <text x="80" y="128" fill="#475569" font-size="20" font-weight="500" font-family="Inter, Pretendard, Arial, sans-serif">
    자재별 finish 중 하나라도 실패하면 전체 생산 마감은 실패로 보고, 이미 성공한 마감 처리까지 롤백합니다.
  </text>

  <rect x="80" y="158" width="1440" height="76" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="110" y="180" width="330" height="32" rx="16" fill="#DCFCE7"/>
  <text x="275" y="202" text-anchor="middle" fill="#166534" font-size="17" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    reporting = 생산품 보고
  </text>
  <rect x="468" y="180" width="360" height="32" rx="16" fill="#E0F2FE"/>
  <text x="648" y="202" text-anchor="middle" fill="#075985" font-size="17" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    comp = 생산품에 소모된 자재 보고
  </text>
  <rect x="856" y="180" width="350" height="32" rx="16" fill="#FFEDD5"/>
  <text x="1031" y="202" text-anchor="middle" fill="#9A3412" font-size="17" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    finish = 자재별 마감 처리
  </text>
  <rect x="1234" y="180" width="256" height="32" rx="16" fill="#FEE2E2"/>
  <text x="1362" y="202" text-anchor="middle" fill="#991B1B" font-size="17" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    rollback = 성공분 취소
  </text>

  <rect x="80" y="274" width="450" height="496" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="328" fill="#0F172A" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    문제 상황
  </text>
  <text x="120" y="360" fill="#64748B" font-size="18" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    부분 마감처럼 보이는 상태
  </text>

  <rect x="120" y="396" width="370" height="56" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="144" y="431" fill="#166534" font-size="20" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    1. reporting 성공
  </text>
  <text x="346" y="431" fill="#166534" font-size="17" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    생산품 보고 완료
  </text>

  <path d="M305 458V492" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSlate)"/>

  <rect x="120" y="500" width="370" height="56" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="144" y="535" fill="#1D4ED8" font-size="20" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    2. comp 성공
  </text>
  <text x="316" y="535" fill="#1D4ED8" font-size="17" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 소모 보고 완료
  </text>

  <path d="M305 562V596" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSlate)"/>

  <rect x="120" y="604" width="370" height="104" rx="20" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="144" y="640" fill="#9A3412" font-size="20" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    3. finish 일부 성공
  </text>
  <text x="144" y="674" fill="#166534" font-size="17" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 A/B는 마감으로 보임
  </text>
  <text x="144" y="698" fill="#B91C1C" font-size="17" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 C 실패 → 실제로는 전체 미마감
  </text>

  <rect x="120" y="722" width="370" height="26" rx="13" fill="#FEE2E2"/>
  <text x="305" y="742" text-anchor="middle" fill="#991B1B" font-size="15" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    사용자는 부분 마감을 완료로 오해할 수 있음
  </text>

  <path d="M536 522H566" stroke="#475569" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowSlate)"/>

  <rect x="575" y="274" width="450" height="496" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="615" y="328" fill="#0F172A" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    자재별 finish 결과
  </text>
  <text x="615" y="360" fill="#64748B" font-size="18" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    한 건이라도 실패하면 전체 생산 마감 실패
  </text>

  <rect x="615" y="398" width="370" height="74" rx="20" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <circle cx="650" cy="435" r="16" fill="#16A34A"/>
  <path d="M642 434L648 440L660 426" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="684" y="430" fill="#166534" font-size="21" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 A finish 성공
  </text>
  <text x="684" y="456" fill="#166534" font-size="16" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    ERP에는 마감 처리로 표시
  </text>

  <rect x="615" y="492" width="370" height="74" rx="20" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <circle cx="650" cy="529" r="16" fill="#16A34A"/>
  <path d="M642 528L648 534L660 520" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="684" y="524" fill="#166534" font-size="21" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 B finish 성공
  </text>
  <text x="684" y="550" fill="#166534" font-size="16" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    ERP에는 마감 처리로 표시
  </text>

  <rect x="615" y="586" width="370" height="74" rx="20" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <circle cx="650" cy="623" r="16" fill="#DC2626"/>
  <path d="M642 615L658 631M658 615L642 631" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <text x="684" y="618" fill="#991B1B" font-size="21" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 C finish 실패
  </text>
  <text x="684" y="644" fill="#991B1B" font-size="16" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    전체 생산은 아직 마감 아님
  </text>

  <rect x="615" y="684" width="370" height="58" rx="18" fill="#0F172A"/>
  <text x="800" y="720" text-anchor="middle" fill="#FFFFFF" font-size="19" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    부분 성공은 전체 성공이 아니다
  </text>

  <path d="M1032 522H1062" stroke="#DC2626" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowRed)"/>

  <rect x="1070" y="274" width="450" height="496" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="1110" y="328" fill="#0F172A" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    개선 흐름
  </text>
  <text x="1110" y="360" fill="#64748B" font-size="18" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    성공분 롤백 + 전체 마감 기준 보장
  </text>

  <rect x="1110" y="398" width="370" height="70" rx="20" fill="#FEF2F2" stroke="#FCA5A5"/>
  <text x="1140" y="432" fill="#991B1B" font-size="21" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    1. 실패 감지
  </text>
  <text x="1140" y="456" fill="#7F1D1D" font-size="16" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 C finish 실패를 전체 작업 실패로 판단
  </text>

  <path d="M1295 474V504" stroke="#7C3AED" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowViolet)"/>

  <rect x="1110" y="512" width="370" height="82" rx="20" fill="#F5F3FF" stroke="#C4B5FD"/>
  <text x="1140" y="546" fill="#6D28D9" font-size="21" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    2. 성공분 식별
  </text>
  <text x="1140" y="570" fill="#5B21B6" font-size="16" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    이미 마감된 자재 A/B를 보상 대상으로 기록
  </text>

  <path d="M1295 600V630" stroke="#7C3AED" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowViolet)"/>

  <rect x="1110" y="638" width="370" height="86" rx="20" fill="#ECFDF5" stroke="#86EFAC"/>
  <text x="1140" y="672" fill="#047857" font-size="21" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    3. 롤백 후 재처리 가능
  </text>
  <text x="1140" y="696" fill="#065F46" font-size="16" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">
    A/B 마감도 취소하고 전체 상태를 미마감으로 맞춤
  </text>

  <rect x="80" y="814" width="1440" height="58" rx="20" fill="#0F172A"/>
  <text x="800" y="849" text-anchor="middle" fill="#FFFFFF" font-size="21" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    하나라도 실패하면 전체 생산 마감은 실패로 보고, 이미 마감된 자재도 롤백해 정합성을 맞춤
  </text>
</svg>
