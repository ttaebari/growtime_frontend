<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <marker id="arrowGray" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L10 6L1 11V1Z" fill="#64748B"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L10 6L1 11V1Z" fill="#16A34A"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L10 6L1 11V1Z" fill="#DC2626"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="920" fill="url(#bg)"/>

  <text x="80" y="92" fill="#0F172A" font-size="38" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    Reporting / Finish / Rollback 보상 흐름
  </text>
  <text x="80" y="132" fill="#475569" font-size="20" font-weight="500" font-family="Inter, Pretendard, Arial, sans-serif">
    완성품 보고와 자재 사용량 보고를 분리하고, Finish 중 일부 자재만 반영된 상태에서 실패하면 Rollback으로 정합성을 복원
  </text>

  <rect x="80" y="180" width="660" height="620" rx="30" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="236" fill="#0F172A" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    정상 / 실패 인식 흐름
  </text>

  <line x1="180" y1="300" x2="180" y2="740" stroke="#94A3B8" stroke-width="3" stroke-dasharray="10 10"/>
  <line x1="540" y1="300" x2="540" y2="740" stroke="#94A3B8" stroke-width="3" stroke-dasharray="10 10"/>
  <text x="180" y="282" text-anchor="middle" fill="#334155" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    MES
  </text>
  <text x="540" y="282" text-anchor="middle" fill="#334155" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    ERP
  </text>

  <rect x="110" y="326" width="140" height="54" rx="16" fill="#E2E8F0"/>
  <text x="180" y="360" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    POP 마감
  </text>

  <path d="M240 410H480" stroke="#16A34A" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <rect x="270" y="382" width="170" height="54" rx="16" fill="#DCFCE7"/>
  <text x="355" y="416" text-anchor="middle" fill="#166534" font-size="18" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    Reporting
  </text>
  <text x="260" y="466" fill="#475569" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    완성품 보고 성공
  </text>

  <path d="M480 520H240" stroke="#64748B" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowGray)"/>
  <rect x="275" y="492" width="170" height="54" rx="16" fill="#E0F2FE"/>
  <text x="360" y="526" text-anchor="middle" fill="#0C4A6E" font-size="18" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    Finish 시작
  </text>
  <text x="250" y="576" fill="#475569" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 사용량 보고 단계 진입
  </text>

  <rect x="320" y="610" width="360" height="132" rx="22" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="350" y="652" fill="#9A3412" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    Finish 도중 부분 실패
  </text>
  <text x="350" y="688" fill="#7C2D12" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 A: 성공
  </text>
  <text x="350" y="716" fill="#7C2D12" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 B: 성공
  </text>
  <text x="350" y="744" fill="#DC2626" font-size="18" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    자재 C: 실패 → 정합성 깨질 수 있음
  </text>

  <rect x="800" y="180" width="720" height="620" rx="30" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="840" y="236" fill="#0F172A" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    보상 로직 설계
  </text>

  <rect x="840" y="286" width="640" height="120" rx="24" fill="#EEF2FF" stroke="#A5B4FC"/>
  <text x="880" y="336" fill="#3730A3" font-size="24" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    1. 상태를 나눠서 관리
  </text>
  <text x="880" y="372" fill="#4338CA" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    Reporting = 완성품 보고, Finish = 자재 사용량 보고, Rollback = 성공분 역보정
  </text>

  <rect x="840" y="430" width="640" height="142" rx="24" fill="#FEF2F2" stroke="#FCA5A5"/>
  <text x="880" y="480" fill="#991B1B" font-size="24" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    2. 부분 성공분을 식별
  </text>
  <text x="880" y="516" fill="#7F1D1D" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    Finish 중 이미 ERP에 반영된 자재 사용량만 추적
  </text>
  <text x="880" y="546" fill="#7F1D1D" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    실패 시점 이후 미반영 건과 구분해서 보상 대상으로 선정
  </text>

  <path d="M1160 584V666" stroke="#DC2626" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowRed)"/>

  <rect x="840" y="666" width="640" height="94" rx="24" fill="#F5F3FF" stroke="#C4B5FD"/>
  <text x="880" y="720" fill="#6D28D9" font-size="24" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    3. Rollback으로 정합성 복원
  </text>
  <text x="880" y="748" fill="#6B21A8" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    성공했던 자재 A/B 사용량을 되돌리고 MES 상태도 재처리 가능 상태로 복구
  </text>

  <rect x="80" y="836" width="1440" height="48" rx="18" fill="#0F172A"/>
  <text x="800" y="867" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    일부 자재만 ERP에 반영된 상태에서 실패해도, Rollback 보상 로직으로 MES와 ERP의 데이터 정합성을 다시 맞춤
  </text>
</svg>
