<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">ERP rollback pseudo code</title>
  <desc id="desc">Pseudo code for rolling back reporting and reportingComp when later ERP calls fail.</desc>
  <rect width="920" height="300" rx="18" fill="#F8FAFC"/>
  <rect x="16" y="16" width="888" height="268" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="16" y="16" width="888" height="42" rx="14" fill="#F1F5F9"/>
  <path d="M16 44H904" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="42" cy="37" r="5" fill="#EF4444"/>
  <circle cx="60" cy="37" r="5" fill="#F59E0B"/>
  <circle cx="78" cy="37" r="5" fill="#22C55E"/>
  <text x="106" y="43" fill="#334155" font-size="15" font-weight="700" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">erp-rollback-flow.txt</text>
  <text x="44" y="96" fill="#0F172A" font-size="22" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" xml:space="preserve">
    <tspan x="44" dy="0">if reportingSuccess:</tspan>
    <tspan x="44" dy="34">  if reportingCompFail:</tspan>
    <tspan x="44" dy="34">    rollback(reporting)</tspan>
    <tspan x="44" dy="34">  if finishFail:</tspan>
    <tspan x="44" dy="34">    rollback(reportingComp)</tspan>
    <tspan x="44" dy="34">    rollback(reporting)</tspan>
  </text>
</svg>
