<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="960" fill="url(#bg)"/>

  <text x="80" y="86" fill="#0F172A" font-size="40" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    GrowTime 백엔드 모듈 구조
  </text>
  <text x="80" y="128" fill="#475569" font-size="20" font-weight="500" font-family="Inter, Pretendard, Arial, sans-serif">
    Controller - Service - Repository 흐름 위에 인증, 사용자, 회고, 공통 모듈을 분리한 패키지 구조
  </text>

  <rect x="80" y="188" width="1440" height="108" rx="28" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
  <text x="800" y="252" text-anchor="middle" fill="#0F172A" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    com.board.growtime
  </text>
  <text x="800" y="282" text-anchor="middle" fill="#64748B" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    Spring Boot Application / Config / Common / Domain Modules
  </text>

  <rect x="120" y="356" width="300" height="232" rx="28" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="414" fill="#1D4ED8" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">auth</text>
  <text x="160" y="456" fill="#0F172A" font-size="20" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">LoginController</text>
  <text x="160" y="488" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">JwtService</text>
  <text x="160" y="518" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">ApiAuthenticationInterceptor</text>
  <text x="160" y="564" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">GitHub OAuth callback 처리</text>
  <text x="160" y="592" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">JWT 발급 / API 인증</text>

  <rect x="470" y="356" width="300" height="232" rx="28" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2" filter="url(#shadow)"/>
  <text x="510" y="414" fill="#166534" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">user</text>
  <text x="510" y="456" fill="#0F172A" font-size="20" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">UserController / UserService</text>
  <text x="510" y="488" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">UserRepository</text>
  <text x="510" y="518" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">GitHubUserService / MilitaryService</text>
  <text x="510" y="564" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">프로필 저장 / 조회</text>
  <text x="510" y="592" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">복무일 / D-Day 계산</text>

  <rect x="820" y="356" width="300" height="232" rx="28" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
  <text x="860" y="414" fill="#C2410C" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">note</text>
  <text x="860" y="456" fill="#0F172A" font-size="20" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">NoteController / NoteService</text>
  <text x="860" y="488" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">NoteRepository</text>
  <text x="860" y="518" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">NoteDto / NoteMapper</text>
  <text x="860" y="564" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">회고 CRUD / 검색 / 개수 조회</text>
  <text x="860" y="592" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">도메인 응답 DTO 분리</text>

  <rect x="1170" y="356" width="300" height="232" rx="28" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2" filter="url(#shadow)"/>
  <text x="1210" y="414" fill="#6D28D9" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">quicklink / common</text>
  <text x="1210" y="456" fill="#0F172A" font-size="20" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">QuickLinkController / Service</text>
  <text x="1210" y="488" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">QuickLinkRepository</text>
  <text x="1210" y="518" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">ApiResponse / ExceptionHandler</text>
  <text x="1210" y="564" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">공통 응답 / 예외 처리</text>
  <text x="1210" y="592" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">HealthController / CORS 설정</text>

  <rect x="160" y="684" width="1280" height="180" rx="32" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="740" text-anchor="middle" fill="#0F172A" font-size="30" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    공통 레이어 흐름
  </text>
  <text x="800" y="788" text-anchor="middle" fill="#334155" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    Controller -> Service -> Repository -> PostgreSQL
  </text>
  <text x="800" y="826" text-anchor="middle" fill="#64748B" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">
    요청 검증, 인증 인터셉터, DTO 매핑, 예외 응답을 공통 계층으로 분리해 도메인별 책임을 나눔
  </text>
</svg>
