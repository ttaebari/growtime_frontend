  <text x="575" y="488" text-anchor="middle" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">GitHub OAuth</text>
  <text x="575" y="512" text-anchor="middle" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">JWT 발급 / 인증</text>

  <rect x="695" y="414" width="210" height="104" rx="22" fill="#FFFFFF" stroke="#BBF7D0"/>
  <text x="800" y="456" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">User Domain</text>
  <text x="800" y="488" text-anchor="middle" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">프로필 저장</text>
  <text x="800" y="512" text-anchor="middle" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">복무일 / D-Day 계산</text>

  <rect x="920" y="414" width="210" height="104" rx="22" fill="#FFFFFF" stroke="#BBF7D0"/>
  <text x="1025" y="456" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Note Domain</text>
  <text x="1025" y="488" text-anchor="middle" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">회고 CRUD</text>
  <text x="1025" y="512" text-anchor="middle" fill="#475569" font-size="17" font-family="Inter, Pretendard, Arial, sans-serif">검색 / 개수 조회</text>

  <path d="M350 422H390" stroke="#475569" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1190 422H1260" stroke="#475569" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1270" y="328" width="250" height="188" rx="28" fill="url(#cardPurple)" stroke="#C4B5FD" stroke-width="2" filter="url(#shadow)"/>
  <text x="1395" y="388" text-anchor="middle" fill="#6D28D9" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Database</text>
  <text x="1395" y="430" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">PostgreSQL</text>
  <text x="1395" y="462" text-anchor="middle" fill="#475569" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">User / Note / QuickLink</text>
  <text x="1395" y="510" text-anchor="middle" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">JPA Repository 접근</text>

  <rect x="470" y="650" width="320" height="188" rx="28" fill="url(#cardOrange)" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
  <text x="630" y="710" text-anchor="middle" fill="#C2410C" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Deployment</text>
  <text x="630" y="748" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">GitHub Actions</text>
  <text x="630" y="780" text-anchor="middle" fill="#7C2D12" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">master 변경 감지</text>
  <text x="630" y="808" text-anchor="middle" fill="#7C2D12" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">Render deploy hook 호출</text>

  <rect x="820" y="650" width="320" height="188" rx="28" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2" filter="url(#shadow)"/>
  <text x="980" y="710" text-anchor="middle" fill="#111827" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Ops</text>
  <text x="980" y="748" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Health Check</text>
  <text x="980" y="780" text-anchor="middle" fill="#475569" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">/actuator/health</text>
  <text x="980" y="808" text-anchor="middle" fill="#475569" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">운영 상태 확인</text>

  <rect x="1170" y="650" width="320" height="188" rx="28" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="2" filter="url(#shadow)"/>
  <text x="1330" y="710" text-anchor="middle" fill="#166534" font-size="28" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">API Scope</text>
  <text x="1330" y="748" text-anchor="middle" fill="#0F172A" font-size="22" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Login / User / Notes</text>
  <text x="1330" y="780" text-anchor="middle" fill="#475569" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">QuickLink / D-Day</text>
  <text x="1330" y="808" text-anchor="middle" fill="#475569" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">REST API 제공</text>
</svg>
