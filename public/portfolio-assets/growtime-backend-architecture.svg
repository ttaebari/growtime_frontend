<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <linearGradient id="cardOrange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFEDD5"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L10 6L1 11V1Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="960" fill="url(#bg)"/>

  <text x="80" y="86" fill="#0F172A" font-size="40" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">
    GrowTime 백엔드 아키텍처
  </text>
  <text x="80" y="128" fill="#475569" font-size="20" font-weight="500" font-family="Inter, Pretendard, Arial, sans-serif">
    GitHub OAuth 인증부터 회고 CRUD, 복무일 계산, 배포 자동화까지 Spring Boot 중심으로 설계한 구조
  </text>

  <rect x="80" y="170" width="1440" height="78" rx="26" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
  <rect x="118" y="193" width="138" height="32" rx="16" fill="#E0F2FE"/>
  <text x="187" y="215" text-anchor="middle" fill="#0C4A6E" font-size="16" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Kotlin 2.0</text>
  <rect x="276" y="193" width="172" height="32" rx="16" fill="#DCFCE7"/>
  <text x="362" y="215" text-anchor="middle" fill="#166534" font-size="16" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Spring Boot 3.5</text>
  <rect x="468" y="193" width="186" height="32" rx="16" fill="#EDE9FE"/>
  <text x="561" y="215" text-anchor="middle" fill="#5B21B6" font-size="16" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Spring Data JPA</text>
  <rect x="674" y="193" width="158" height="32" rx="16" fill="#DBEAFE"/>
  <text x="753" y="215" text-anchor="middle" fill="#1D4ED8" font-size="16" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">PostgreSQL</text>
  <rect x="852" y="193" width="118" height="32" rx="16" fill="#FFEDD5"/>
  <text x="911" y="215" text-anchor="middle" fill="#C2410C" font-size="16" font-weight="700" font-family="Inter, Pretendard, Arial, sans-serif">Docker</text>
