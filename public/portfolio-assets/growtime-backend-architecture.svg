  <text x="800" y="374" text-anchor="middle" fill="#14532D" font-size="20" font-weight="600" font-family="Inter, Pretendard, Arial, sans-serif">Render + Docker runtime</text>

  <rect x="470" y="414" width="210" height="104" rx="22" fill="#FFFFFF" stroke="#BBF7D0"/>
