  <text x="220" y="462" text-anchor="middle" fill="#475569" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">Vercel 배포</text>
  <text x="220" y="510" text-anchor="middle" fill="#334155" font-size="18" font-family="Inter, Pretendard, Arial, sans-serif">GitHub OAuth callback</text>

