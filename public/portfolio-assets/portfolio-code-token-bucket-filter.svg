    .num { fill: #DC2626; font-weight: 700; }
    .prop { fill: #0F766E; }
    .dim { fill: #64748B; }
  </style>
  <rect width="920" height="1400" rx="18" fill="#F8FAFC"/>
  <rect x="16" y="16" width="888" height="1368" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
