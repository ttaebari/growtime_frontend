<svg xmlns="http://www.w3.org/2000/svg" width="920" height="1400" viewBox="0 0 920 1400" role="img" aria-labelledby="title desc">
  <title id="title">DashboardRateLimitFilter Kotlin code</title>
  <desc id="desc">Full Kotlin code example for Bucket4j Token Bucket rate limiting in a Spring OncePerRequestFilter.</desc>
  <rect width="920" height="1400" rx="18" fill="#F8FAFC"/>
  <rect x="16" y="16" width="888" height="1368" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="16" y="16" width="888" height="42" rx="14" fill="#F1F5F9"/>
  <path d="M16 44H904" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="42" cy="37" r="5" fill="#EF4444"/>
  <circle cx="60" cy="37" r="5" fill="#F59E0B"/>
  <circle cx="78" cy="37" r="5" fill="#22C55E"/>
  <text x="106" y="43" fill="#334155" font-size="15" font-weight="700" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">DashboardRateLimitFilter.kt</text>
  <text x="44" y="92" fill="#0F172A" font-size="18" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" xml:space="preserve">
    <tspan x="44" dy="0">class DashboardRateLimitFilter : OncePerRequestFilter() {</tspan>
    <tspan x="44" dy="27"></tspan>
    <tspan x="44" dy="27">    private val buckets = ConcurrentHashMap&lt;String, Bucket&gt;()</tspan>
    <tspan x="44" dy="27"></tspan>
    <tspan x="44" dy="27">    override fun doFilterInternal(</tspan>
    <tspan x="44" dy="27">        request: HttpServletRequest,</tspan>
    <tspan x="44" dy="27">        response: HttpServletResponse,</tspan>
    <tspan x="44" dy="27">        chain: FilterChain</tspan>
    <tspan x="44" dy="27">    ) {</tspan>
    <tspan x="44" dy="27">        if (request.method != "GET" ||</tspan>
    <tspan x="44" dy="27">            !request.requestURI.startsWith(</tspan>
    <tspan x="44" dy="27">                "/api/dashboard/latest"</tspan>
    <tspan x="44" dy="27">            )</tspan>
    <tspan x="44" dy="27">        ) {</tspan>
    <tspan x="44" dy="27">            chain.doFilter(request, response)</tspan>
    <tspan x="44" dy="27">            return</tspan>
    <tspan x="44" dy="27">        }</tspan>
    <tspan x="44" dy="27"></tspan>
    <tspan x="44" dy="27">        val userKey = SecurityContextHolder.getContext()</tspan>
    <tspan x="44" dy="27">            .authentication</tspan>
    <tspan x="44" dy="27">            ?.name</tspan>
    <tspan x="44" dy="27">            ?: request.remoteAddr</tspan>
    <tspan x="44" dy="27"></tspan>
    <tspan x="44" dy="27">        val bucketKey = "$userKey:${request.requestURI}"</tspan>
    <tspan x="44" dy="27">        val bucket = buckets.computeIfAbsent(bucketKey) { createBucket() }</tspan>
    <tspan x="44" dy="27"></tspan>
    <tspan x="44" dy="27">        if (!bucket.tryConsume(1)) {</tspan>
    <tspan x="44" dy="27">            response.status = 429</tspan>
    <tspan x="44" dy="27">            response.contentType = "application/json;charset=UTF-8"</tspan>
    <tspan x="44" dy="27">            response.writer.write(</tspan>
    <tspan x="44" dy="27" font-size="15">                """{"message":"잠시 후 다시 조회해주세요.","code":"TOO_MANY_REQUESTS"}"""</tspan>
    <tspan x="44" dy="27">            )</tspan>
    <tspan x="44" dy="27">            return</tspan>
    <tspan x="44" dy="27">        }</tspan>
    <tspan x="44" dy="27"></tspan>
    <tspan x="44" dy="27">        chain.doFilter(request, response)</tspan>
    <tspan x="44" dy="27">    }</tspan>
    <tspan x="44" dy="27"></tspan>
    <tspan x="44" dy="27">    private fun createBucket(): Bucket {</tspan>
    <tspan x="44" dy="27">        val nextMinute = ZonedDateTime.now()</tspan>
    <tspan x="44" dy="27">            .truncatedTo(ChronoUnit.MINUTES)</tspan>
    <tspan x="44" dy="27">            .plusMinutes(1)</tspan>
    <tspan x="44" dy="27">            .toInstant()</tspan>
    <tspan x="44" dy="27"></tspan>
    <tspan x="44" dy="27">        return Bucket.builder()</tspan>
    <tspan x="44" dy="27">            .addLimit { limit -&gt;</tspan>
    <tspan x="44" dy="27">                limit.capacity(1)</tspan>
    <tspan x="44" dy="27">                    .refillIntervallyAligned(</tspan>
    <tspan x="44" dy="27">                        1,</tspan>
    <tspan x="44" dy="27">                        Duration.ofMinutes(1),</tspan>
    <tspan x="44" dy="27">                        nextMinute</tspan>
    <tspan x="44" dy="27">                    )</tspan>
    <tspan x="44" dy="27">            }</tspan>
    <tspan x="44" dy="27">            .build()</tspan>
    <tspan x="44" dy="27">    }</tspan>
    <tspan x="44" dy="27">}</tspan>
  </text>
</svg>
