<svg xmlns="http://www.w3.org/2000/svg" width="920" height="1400" viewBox="0 0 920 1400" role="img" aria-labelledby="title desc">
  <title id="title">DashboardRateLimitFilter Kotlin code</title>
  <desc id="desc">Syntax highlighted Kotlin code example for Bucket4j Token Bucket rate limiting in a Spring OncePerRequestFilter.</desc>
  <style>
    .code { font: 16px SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #0F172A; }
    .ln { font: 13px SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #94A3B8; text-anchor: end; }
    .kw { fill: #2563EB; font-weight: 700; }
